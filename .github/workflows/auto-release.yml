name: Auto Release on Tag

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build tarball
        run: |
          TAG="${GITHUB_REF_NAME}"
          ARCHIVE="neocrash-${TAG}.tar.gz"
          tar -czf "$ARCHIVE" bin/ lib/ locale/
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            ${{ env.ARCHIVE }}
